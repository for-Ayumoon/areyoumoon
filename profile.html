<!DOCTYPE html>
<html lang="en">
<head>
	
	<!-- Basic -->
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>Profile - Shinogaya Ayumu Archive</title>
	
	<!-- Mobile Specific Metas -->
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	
	<!-- Load Fonts -->
	<link href='https://fonts.googleapis.com/css?family=Roboto+Mono:400,100,300italic,300,100italic,400italic,500,500italic,700,700italic&amp;subset=latin,cyrillic' rel='stylesheet'>
	
	<!-- CSS -->
	<link rel="stylesheet" href="assets/css/glitche-basic.css" />
	<link rel="stylesheet" href="assets/css/ionicons.css" />
	<link rel="stylesheet" href="assets/css/magnific-popup.css" />
	<link rel="stylesheet" href="assets/css/animate.css" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/custom.css" />
	
	<!-- Favicons -->
	<link rel="shortcut icon" href="assets/images/favicons/favicon.ico">
	
	<!-- 💡 枠線をピンクに上書き -->
	<style>
		.line.top, .line.bottom, .line.left, .line.right {
			background: #ff70b5 !important;
		}
		/* プロフィールページ用のカスタムレイアウト */
		.profile-box {
			display: flex;
			align-items: flex-start;
			justify-content: center;
			gap: 40px;
			max-width: 800px;
			margin: 0 auto;
			text-align: left;
			padding: 0 20px;
		}
		.profile-image {
			width: 250px;
			height: 250px;
			background: #eee; /* 画像がない場合のプレースホルダグレー */
			border: 2px solid #ff70b5; /* ピンクの枠線 */
			display: flex;
			align-items: center;
			justify-content: center;
			color: #999;
			font-size: 12px;
		}
		.profile-text {
			font-family: 'Roboto Mono', monospace;
			color: #141414;
		}
		.profile-name-ja {
			font-size: 32px;
			font-weight: bold;
			margin-bottom: 5px;
			letter-spacing: 0.1em;
		}
		.profile-name-en {
			font-size: 16px;
			color: #888;
			text-transform: uppercase;
			margin-bottom: 30px;
			letter-spacing: 0.2em;
		}
		.profile-details dl {
			display: grid;
			grid-template-columns: 120px 1fr;
			gap: 15px 10px;
			font-size: 14px;
		}
		.profile-details dt {
			color: #888;
			font-weight: normal;
		}
		.profile-details dd {
			font-weight: bold;
			margin: 0;
		}
		/* スマホ対応 */
		@media (max-width: 768px) {
			.profile-box {
				flex-direction: column;
				align-items: center;
				gap: 20px;
			}
			.profile-image {
				width: 100%;
				max-width: 250px;
				height: 250px;
			}
		}
	</style>
	
</head>

<body>	
	
	<!-- Preloader -->
	<div class="preloader">
		<div class="centrize full-width">
			<div class="vertical-center">
				<div class="pre-inner">
					<div class="load typing-load"><p>loading...</p></div>
					<span class="typed-load"></span>
				</div>
			</div>
		</div>
	</div>
	
	<!-- Container -->
	<div class="container">
		
		<!-- Header -->
		<header class="fixed left-0 top-[30px] w-full z-[100] text-right bg-white opacity-100 visible">
			<div class="head-top px-[65px] pt-[30px] pb-[15px]">
				<a href="#" class="menu-btn"><span></span></a>
				<div class="top-menu">
					<ul>
						<li class="ml-[50px] inline-block align-top"><a href="index.html" class="lnk block mt-[12px]">Home</a></li>
						<li class="active ml-[50px] inline-block align-top"><a href="profile.html" class="lnk block mt-[12px]">Profile</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="gallery.html" class="lnk block mt-[12px]">Gallery</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="fancam.html" class="lnk block mt-[12px]">Fancam</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="link.html" class="lnk block mt-[12px]">Link</a></li>
					</ul>
				</div>
			</div>
		</header>
		
		<!-- Wrapper -->
		<div class="wrapper">
		
			<!-- 💡 メインコンテンツ：Profile -->
			<div class="section started relative z-[97] opacity-100 visible text-center p-0 m-0" style="height: auto; padding: 150px 0 100px;">
				<div class="centrize full-width">
					<div class="vertical-center">
						<div class="started-content inline-block align-middle text-center relative">
							
							<div class="profile-box">
								<!-- 左：画像プレースホルダ（後で assets/images/ に画像を置いて src を書き換えてください） -->
								<div class="profile-image glitch-effect">
									<img src="assets/images/ayumu_profile.jpg" alt="AYUMU" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'; this.parentNode.textContent='PHOTO PLACEHOLDER'">
								</div>
								
								<!-- 右：テキスト詳細 -->
								<div class="profile-text">
									<div class="profile-name-ja glitch-effect" data-text="篠ヶ谷 歩夢">篠ヶ谷 歩夢</div>
									<div class="profile-name-en">SHINOGAYA AYUMU</div>
									
									<div class="profile-details">
										<dl>
											<dt>生年月日</dt><dd>2001/07/24</dd>
											<dt>出身地</dt><dd>静岡県</dd>
											<dt>身長</dt><dd>175</dd>
											<dt>趣味</dt><dd>パスタ研究</dd>
											<dt>特技</dt><dd>水泳</dd>
											<dt>MBTI</dt><dd>ISTP</dd>
											<dt>キーワード</dt><dd>臥薪嘗胆</dd>
										</dl>
									</div>
								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		
		</div>
		
		<!-- Footer -->
		<footer class="fixed bottom-[25px] left-0 px-[60px] pt-[15px] pb-[30px] w-full bg-white z-[100] opacity-100 visible">
			<div class="copy float-left pt-[2px] text-[11px] text-[#999]">© Ayumoon. Unofficial fan site.</div>
			<div class="clr"></div>
		</footer>
		
		<!-- Lines -->
		<div class="line top"></div>
		<div class="line bottom"></div>
		<div class="line left"></div>
		<div class="line right"></div>
		
	</div>
	
	<!-- jQuery Scripts -->
    <script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.validate.js"></script>
	<script src="assets/js/typed.js"></script>
	<script src="assets/js/magnific-popup.js"></script>
	<script src="assets/js/imagesloaded.pkgd.js"></script>
	<script src="assets/js/isotope.pkgd.js"></script>
	
	<!-- Main Scripts -->
	<script src="assets/js/glitche-scripts.js"></script>
	
</body>
</html>
