			background: #ff70b5 !important;
		}
		/* ファンカム（YouTube）用のカスタムレイアウト */
		.fancam-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 30px;
			max-width: 1000px;
			margin: 0 auto;
			padding: 0 20px;
		}
		.fancam-item {
			position: relative;
			padding-bottom: 56.25%; /* 16:9のアスペクト比 */
			height: 0;
			overflow: hidden;
			border: 2px solid #ff70b5;
		}
		.fancam-item iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: 0;
		}
		@media (max-width: 768px) {
			.fancam-grid {
				grid-template-columns: 1fr; /* スマホでは縦一列 */
			}
		}
	</style>
