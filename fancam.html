	<link rel="stylesheet" href="assets/css/glitche-basic.css" />

	<style>
		/* =========================================
		   PC・スマホ共通：スクロールロックの完全解除
		========================================= */
		html, body, .container, .wrapper {
			height: auto !important;
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}

		/* フォント設定 */
		body, h1, h2, h3, h4, h5, h6, p, a, li, .h-title, .copy {
			font-family: 'Pixelify Sans', 'DotGothic16', sans-serif !important;
		}
		
		/* 枠線基本色 */
		.line.top, .line.bottom, .line.left, .line.right {
			background: #ff70b5 !important;
		}
		
		/* ホバー時の色変更 */
		a:hover, .top-menu ul li a:hover {
			color: #ffdc00 !important;
			transition: color 0.3s ease;
		}
		.top-menu ul li.active a {
			color: #ffdc00 !important;
		}
		
		/* ファンカムレイアウト（PC） */
		.fancam-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 30px;
			max-width: 1000px;
			margin: 0 auto;
			padding: 0 20px;
		}
		.fancam-item {
			position: relative;
			padding-bottom: 56.25%;
			height: 0;
			overflow: hidden;
			border: 2px solid #ff70b5;
			transition: border-color 0.3s ease;
		}
		.fancam-item:hover {
			border-color: #ffdc00 !important;
		}
		.fancam-item iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: 0;
		}

		/* フッターを最下部に流す（固定解除） */
		footer {
			position: relative !important;
			bottom: 0 !important;
			left: 0 !important;
			width: 100% !important;
			padding: 30px 65px !important;
			margin-top: 60px;
			background: white;
			z-index: 100;
		}

		/* =========================================
		   スマホ用レスポンシブ設定
		========================================= */
		@media (max-width: 768px) {
			/* ヘッダー＆メニュー */
			header .head-top { padding: 15px 10px !important; }
			.top-menu ul { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px; padding: 0; }
			.top-menu ul li { margin: 0 !important; display: block; }
			.top-menu ul li a { font-size: 14px; margin-top: 5px !important; }
			.menu-btn { display: none !important; }
			
			/* 余白とタイトル */
			.section.started { padding: 100px 0 20px !important; }
			.h-title { font-size: 28px !important; margin-bottom: 30px !important; }
			
			/* スマホ用フッター調整 */
			footer { padding: 15px !important; text-align: center; margin-top: 40px; }
			footer .copy { float: none !important; display: inline-block; font-size: 11px; }

			/* 動画グリッド（スマホでは縦1列） */
			.fancam-grid { grid-template-columns: 1fr; gap: 20px; padding: 0 15px; }
		}
	</style>
	
</head>
