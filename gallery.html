	<style>
		/* =========================================
		   PC・スマホ共通：スクロールロックの完全解除
		========================================= */
		html, body, .container, .wrapper {
			height: auto !important;
			overflow-y: auto !important;
			overflow-x: hidden !important;
		}

		/* フォント設定 */
		body, h1, h2, h3, h4, h5, h6, p, a, li, .h-title, .copy {
			font-family: 'Pixelify Sans', 'DotGothic16', sans-serif !important;
		}
		
		/* 枠線基本色 */
		.line.top, .line.bottom, .line.left, .line.right {
			background: #ff70b5 !important;
		}
		
		/* ホバー時の色変更 */
		a:hover, .top-menu ul li a:hover {
			color: #ffdc00 !important;
			transition: color 0.3s ease;
		}
		.top-menu ul li.active a {
			color: #ffdc00 !important;
		}
		
		/* 小見出しのデザイン */
		.gallery-subheading {
			font-size: 26px;
			font-weight: bold;
			color: #1a1a1a;
			margin: 50px 0 20px;
			letter-spacing: 0.05em;
			text-align: center;
		}

		/* ギャラリーレイアウト（PC） */
		.gallery-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
			gap: 15px;
			max-width: 1000px;
			margin: 0 auto;
			padding: 0 20px;
		}
		.gallery-item {
			border: 2px solid #ff70b5;
			transition: border-color 0.3s ease;
			overflow: hidden; /* ホバー時の拡大用 */
			display: block;
			background: #eee; /* 読み込み前の背景色 */
			min-height: 200px; /* 万が一の画像切れ時も潰れないように最低限の高さを確保 */
		}
		.gallery-item:hover {
			border-color: #ffdc00 !important;
		}
		.gallery-item img {
			display: block;
			width: 100%;
			height: auto; /* 縦横比を維持して表示（見切れ防止） */
			transition: transform 0.3s ease;
		}
		.gallery-item:hover img {
			transform: scale(1.05);
		}

		/* フッターを最下部に流す（固定解除） */
		footer {
			position: relative !important;
			bottom: 0 !important;
			left: 0 !important;
			width: 100% !important;
			padding: 30px 65px !important;
			margin-top: 60px;
			background: white;
			z-index: 100;
		}

		/* =========================================
		   スマホ用レスポンシブ設定
		========================================= */
		@media (max-width: 768px) {
			/* ヘッダー＆メニュー */
			header .head-top { padding: 15px 10px !important; }
			.top-menu ul { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px; padding: 0; }
			.top-menu ul li { margin: 0 !important; display: block; }
			.top-menu ul li a { font-size: 14px; margin-top: 5px !important; }
			.menu-btn { display: none !important; }
			
			/* 余白とタイトル */
			.section.started { padding: 100px 0 20px !important; }
			.h-title { font-size: 42px !important; margin-bottom: 20px !important; }
			.gallery-subheading { font-size: 18px; margin: 40px 0 15px; }
			
			/* スマホ用フッター調整 */
			footer { padding: 15px !important; text-align: center; margin-top: 40px; }
			footer .copy { float: none !important; display: inline-block; font-size: 11px; }

			/* ギャラリー（スマホでは2列） */
			.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 15px; }
			.gallery-item { min-height: 120px; } /* スマホ用の潰れ防止サイズ */
		}
	</style>
	
</head>
