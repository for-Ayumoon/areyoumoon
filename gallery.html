<!DOCTYPE html>
<html lang="ja">
<head>
	
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>Gallery - Shinogaya Ayumu Archive</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" href="assets/css/glitche-basic.css" />
	<link rel="stylesheet" href="assets/css/ionicons.css" />
	<link rel="stylesheet" href="assets/css/magnific-popup.css" />
	<link rel="stylesheet" href="assets/css/animate.css" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/custom.css" />
	
	<link rel="shortcut icon" href="assets/images/favicons/favicon.ico">
	
	<style>
		/* フォント設定 */
		body, h1, h2, h3, h4, h5, h6, p, a, li, .h-title, .copy {
			font-family: 'Pixelify Sans', 'DotGothic16', sans-serif !important;
		}
		
		/* 枠線基本色 */
		.line.top, .line.bottom, .line.left, .line.right {
			background: #ff70b5 !important;
		}
		
		/* ホバー時の色変更 */
		a:hover, .top-menu ul li a:hover {
			color: #ffdc00 !important;
			transition: color 0.3s ease;
		}
		.top-menu ul li.active a {
			color: #ffdc00 !important;
		}
		
		/* ギャラリーレイアウト（PC） */
		.gallery-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
			gap: 15px;
			max-width: 1000px;
			margin: 0 auto;
			padding: 0 20px;
		}
		.gallery-item {
			background: #eee;
			aspect-ratio: 1 / 1;
			border: 2px solid #ff70b5;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #999;
			overflow: hidden;
			transition: border-color 0.3s ease;
		}
		.gallery-item:hover {
			border-color: #ffdc00 !important;
		}
		.gallery-item img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			transition: transform 0.3s ease;
		}
		.gallery-item:hover img {
			transform: scale(1.05);
		}

		/* =========================================
		   スマホ用レスポンシブ設定
		========================================= */
		@media (max-width: 768px) {
			/* ヘッダー＆メニュー */
			header .head-top { padding: 15px 10px !important; }
			.top-menu ul { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px; padding: 0; }
			.top-menu ul li { margin: 0 !important; display: block; }
			.top-menu ul li a { font-size: 14px; margin-top: 5px !important; }
			.menu-btn { display: none !important; }
			
			/* 余白とフッター */
			.section.started { padding: 100px 0 100px !important; }
			.h-title { font-size: 28px !important; margin-bottom: 30px !important; }
			footer { padding: 15px !important; text-align: center; }
			footer .soc { float: none !important; margin-bottom: 10px; display: flex; justify-content: center; gap: 15px; }
			footer .soc a { margin: 0 !important; }
			footer .copy { float: none !important; display: inline-block; font-size: 11px; }

			/* ギャラリー（スマホでは2列） */
			.gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 15px; }
		}
	</style>
	
</head>

<body>	
	
	<div class="preloader">
		<div class="centrize full-width">
			<div class="vertical-center">
				<div class="pre-inner">
					<div class="load typing-load"><p>loading...</p></div>
					<span class="typed-load"></span>
				</div>
			</div>
		</div>
	</div>
	
	<div class="container">
		
		<header class="fixed left-0 top-[30px] w-full z-[100] text-right bg-white opacity-100 visible">
			<div class="head-top px-[65px] pt-[30px] pb-[15px]">
				<a href="#" class="menu-btn"><span></span></a>
				<div class="top-menu">
					<ul>
						<li class="ml-[50px] inline-block align-top"><a href="index.html" class="lnk block mt-[12px]">Home</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="profile.html" class="lnk block mt-[12px]">Profile</a></li>
						<li class="active ml-[50px] inline-block align-top"><a href="gallery.html" class="lnk block mt-[12px]">Gallery</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="fancam.html" class="lnk block mt-[12px]">Fancam</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="link.html" class="lnk block mt-[12px]">Link</a></li>
					</ul>
				</div>
			</div>
		</header>
		
		<div class="wrapper">
		
			<div class="section started relative z-[97] opacity-100 visible text-center p-0 m-0" style="height: auto; padding: 150px 0 100px;">
				<div class="centrize full-width">
					<div class="vertical-center">
						<div class="started-content inline-block align-middle text-center relative">
							
							<div class="h-title text-[40px] font-bold uppercase tracking-[0.04em] mx-0 mt-[10px] mb-[50px] glitch-effect" data-text="IMAGE GALLERY">IMAGE <span>GALLERY</span></div>
							
							<div class="gallery-grid">
								<div class="gallery-item"><img src="assets/images/gallery/photo1.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_01'"></div>
								<div class="gallery-item"><img src="assets/images/gallery/photo2.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_02'"></div>
								<div class="gallery-item"><img src="assets/images/gallery/photo3.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_03'"></div>

								<div class="gallery-item"><img src="assets/images/gallery/photo6.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_06'"></div>
								<div class="gallery-item"><img src="assets/images/gallery/photo7.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_07'"></div>
								<div class="gallery-item"><img src="assets/images/gallery/photo8.jpg" onerror="this.style.display='none'; this.parentNode.textContent='IMG_08'"></div>
							</div>

						</div>
					</div>
				</div>
			</div>
		
		</div>
		
		<footer class="fixed bottom-[25px] left-0 px-[60px] pt-[15px] pb-[30px] w-full bg-white z-[100] opacity-100 visible">
			<div class="copy float-left pt-[2px] text-[13px] text-[#999]">© Ayumoon. Unofficial fan site.</div>
			<div class="clr"></div>
		</footer>
		
		<div class="line top"></div>
		<div class="line bottom"></div>
		<div class="line left"></div>
		<div class="line right"></div>
		
	</div>
	
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.validate.js"></script>
	<script src="assets/js/typed.js"></script>
	<script src="assets/js/magnific-popup.js"></script>
	<script src="assets/js/imagesloaded.pkgd.js"></script>
	<script src="assets/js/isotope.pkgd.js"></script>
	
	<script src="assets/js/glitche-scripts.js"></script>
	
</body>
</html>
