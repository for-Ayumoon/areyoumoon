<!DOCTYPE html>
<html lang="ja">
<head>
	
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>Home - Shinogaya Ayumu Archive</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
	
	<!-- Load Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" href="assets/css/glitche-basic.css" />
	<link rel="stylesheet" href="assets/css/ionicons.css" />
	<link rel="stylesheet" href="assets/css/magnific-popup.css" />
	<link rel="stylesheet" href="assets/css/animate.css" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="stylesheet" href="assets/css/custom.css" />
	
	<link rel="shortcut icon" href="assets/images/favicons/favicon.ico">
	
	<style>
		/* フォント設定 */
		body, h1, h2, h3, h4, h5, h6, p, a, li, .subtitle, .copy {
			font-family: 'Pixelify Sans', 'DotGothic16', sans-serif !important;
		}
		
		/* 枠線基本色 */
		.line.top, .line.bottom, .line.left, .line.right {
			background: #ff70b5 !important;
		}
		
		/* =========================================
		   ヘッダー・メニューの透過と白文字化
		========================================= */
		header {
			background: transparent !important;
			box-shadow: none !important;
		}
		.top-menu ul li a {
			color: #ffffff !important;
			text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
		}
		a:hover, .top-menu ul li a:hover, .top-menu ul li.active a {
			color: #ffdc00 !important;
			transition: color 0.3s ease;
		}

		/* =========================================
		   HTML埋め込み背景画像のスタイル調整
		========================================= */
		.full-bg-container {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1; /* コンテンツの後ろに配置 */
			overflow: hidden;
		}
		.full-bg-image {
			width: 100%;
			height: 100%;
			object-fit: cover;
			/* お顔のポジション：左から48%、上から30%の位置を中心に */
			object-position: 48% 30%; 
		}
		/* 画像の上の暗めマスクレイヤー */
		.full-bg-mask {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.4);
		}

		/* テンプレートのデフォルトグレー背景を強制無効化 */
		.section.started {
			background: transparent !important;
			height: 100vh !important;
			position: relative;
			overflow: hidden;
		}

		/* グリッチエフェクトの白い四角バグを消す */
		.glitch-effect, .glitch-effect::before, .glitch-effect::after {
			background: transparent !important;
			color: #ffffff !important;
			text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
		}

		/* メインテキストの装飾 */
		.started_text {
			color: #e0e0e0 !important;
			text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
		}
		.subtitle {
			color: #ffdc00 !important;
			text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
		}

		/* =========================================
		   フッターの透過化
		========================================= */
		footer {
			background: transparent !important;
			border: none !important;
		}
		footer .copy {
			color: #e0e0e0 !important;
			text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
		}
		
		/* =========================================
		   スマホ用レスポンシブ設定
		========================================= */
		@media (max-width: 768px) {
			header .head-top { padding: 15px 10px !important; }
			.top-menu ul { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 15px; padding: 0; }
			.top-menu ul li { margin: 0 !important; display: block; }
			.top-menu ul li a { font-size: 14px; margin-top: 5px !important; }
			.menu-btn { display: none !important; }
			
			footer { padding: 15px !important; text-align: center; bottom: 15px !important; }
			footer .copy { float: none !important; display: inline-block; font-size: 11px; }

			/* スマホ時の顔位置微調整 */
			.full-bg-image {
				object-position: 46% 25%;
			}
			.h-title {
				font-size: 40px !important;
			}
		}
	</style>
	
</head>

<body>	
	
	<div class="preloader">
		<div class="centrize full-width">
			<div class="vertical-center">
				<div class="pre-inner">
					<div class="load typing-load"><p>loading...</p></div>
					<span class="typed-load"></span>
				</div>
			</div>
		</div>
	</div>
	
	<div class="container">
		
		<header class="fixed left-0 top-[30px] w-full z-[100] text-right opacity-100 visible">
			<div class="head-top px-[65px] pt-[30px] pb-[15px]">
				<a href="#" class="menu-btn"><span></span></a>
				<div class="top-menu">
					<ul>
						<li class="active ml-[50px] inline-block align-top"><a href="index.html" class="lnk block mt-[12px]">Home</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="profile.html" class="lnk block mt-[12px]">Profile</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="gallery.html" class="lnk block mt-[12px]">Gallery</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="fancam.html" class="lnk block mt-[12px]">Fancam</a></li>
						<li class="ml-[50px] inline-block align-top"><a href="link.html" class="lnk block mt-[12px]">Link</a></li>
					</ul>
				</div>
			</div>
		</header>
		
		<div class="wrapper">
		
			<div class="section started relative z-[97] h-screen opacity-100 visible text-center p-0 m-0">
				
				<!-- 【追加】確実にお顔を表示させるための最背面画像要素 -->
				<div class="full-bg-container">
					<img src="shinogayaayumu_4.jpg" alt="Background" class="full-bg-image">
					<div class="full-bg-mask"></div>
				</div>

				<div class="centrize full-width" style="position: relative; z-index: 2;">
					<div class="vertical-center">
						<div class="started-content inline-block align-middle text-center relative">
							
							<div class="started_text text-[15px] font-normal uppercase tracking-[0.5em] m-0 p-0">Hello, We Love</div>
							
							<div class="h-title text-[68px] font-bold uppercase tracking-[0.04em] mx-0 mt-[10px] mb-[50px] glitch-effect" data-text="AYUMU.S">SHINOGAYA <span>AYUMU</span></div>
							
							<div class="subtitle text-[14px] font-normal uppercase tracking-[0.3em] h-[14px]">
								<span class="typed-subtitle"></span>
							</div>
							
						</div>
					</div>
				</div>
			</div>
		
		</div>
		
		<footer class="fixed bottom-[25px] left-0 px-[60px] pt-[15px] pb-[30px] w-full z-[100] opacity-100 visible">
			<div class="copy float-left pt-[2px] text-[13px]">© Ayumoon. Unofficial fan site.</div>
			<div class="clr"></div>
		</footer>
		
		<div class="line top"></div>
		<div class="line bottom"></div>
		<div class="line left"></div>
		<div class="line right"></div>
		
	</div>
	
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.validate.js"></script>
	<script src="assets/js/typed.js"></script>
	<script src="assets/js/magnific-popup.js"></script>
	<script src="assets/js/imagesloaded.pkgd.js"></script>
	<script src="assets/js/isotope.pkgd.js"></script>
	
	<script src="assets/js/glitche-scripts.js"></script>
	
	<script>
		$(function(){
			$(".typed-subtitle").typed({
				strings: ["DANCER.", "VOCALIST.", "ISTP.", "SHIZUOKA."],
				typeSpeed: 60,
				backDelay: 2000,
				loop: true
			});
		});
	</script>
	
</body>
</html>
