<style>
    /* （省略：他のスタイルはそのまま） */

    /* 画像の配置（背景として配置する本来の指定） */
    .bg-img-fixed {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* 背景にする */
        object-fit: cover;
        object-position: 48% 30%;
    }

    /* テンプレートが画像に被せていた要素を透明化 */
    .section.started {
        background: transparent !important;
        z-index: 10 !important; /* コンテンツを画像より前に出す */
    }

    /* 文字色を白にして視認性を確保 */
    .h-title, .h-title span, .typed-subtitle, .h-subtitle p {
        color: #ffffff !important;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    /* マスクも画像と文字の間に配置 */
    .bg-mask {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.3);
        z-index: 0;
    }
</style>
